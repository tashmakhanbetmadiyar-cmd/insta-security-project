<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram-ға кіру • Фишинг Тренажері</title>
    <link rel="stylesheet" href="istyle.css">
</head>
<body>

    <div class="login-container">
        <div class="logo">Instagram</div>
        
        <form id="phishingForm">
            <input type="text" id="email" placeholder="Телефон, пайдаланушы аты немесе email" required>
            <input type="password" id="pass" placeholder="Құпия сөз" required>
            <button type="submit">Кіру</button>
        </form>

        <div class="separator">
            <div class="line"></div>
            <div class="or">НЕМЕСЕ</div>
            <div class="line"></div>
        </div>

        <div class="fb-login">
            <a href="#">
                <img src="https://cdn-icons-png.flaticon.com/512/124/124010.png" alt="FB">
                Facebook арқылы кіру
            </a>
        </div>

        <div class="forgot-password">
            <a href="#">Құпия сөзді ұмыттыңыз ба?</a>
        </div>
    </div> 

    <div class="signup-container">
        Ақкаунтыңыз жоқ па? <a href="#">Тіркелу</a>
    </div>

    <footer class="footer">
        <div class="footer-links">
            <a href="#">Meta</a> <a href="#">Туралы</a> <a href="#">Блог</a> 
            <a href="#">Жұмыс орындары</a> <a href="#">Анықтама</a> <a href="#">API</a> 
            <a href="#">Құпиялылық</a> <a href="#">Шарттар</a> <a href="#">Үздік аккаунттар</a>
        </div>
        <div class="footer-copyright">
            © 2026 Instagram from Meta | <b>11 Ә сыныбы жобасы</b>
        </div>
    </footer>

    <script src="iscript.js"></script>
</body>
</html>
